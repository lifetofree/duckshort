name = "duckshort"
main = "src/index.tsx"
compatibility_date = "2025-04-15"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./frontend/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[dev]
port = 8787
local_protocol = "http"

[[d1_databases]]
binding = "DB"
database_name = "duckshort-db"
database_id = "cbb432e6-7252-461d-83ff-d792be1413fb"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

[triggers]
crons = ["0 * * * *"]

[vars]
# Production override: set BASE_URL via `wrangler secret put BASE_URL` or in the Cloudflare dashboard
# under Workers > Settings > Variables. Do NOT hardcode the production domain here.
BASE_URL = "https://duckshort.cc"

# ADMIN_SECRET is stored as an encrypted secret — do NOT add it here.
# Run once to set it: wrangler secret put ADMIN_SECRET

[observability]
enabled = true

[[routes]]
pattern = "duckshort.cc/*"
zone_name = "duckshort.cc"

# 7.1: Staging environment. Overrides the D1 binding, BASE_URL, and
# PAGES_URL so PR builds land on a separate DB + Pages project without
# touching production. Deploy with `wrangler deploy --env staging`.
[env.staging]
name = "duckshort-staging"

[env.staging.vars]
BASE_URL = "https://staging.duckshort.cc"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "duckshort-db-staging"
database_id = "00000000-0000-0000-0000-000000000000"  # Replace with the real staging DB id (see docs/OPERATIONS.md §staging)

[[env.staging.durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

[env.staging.observability]
enabled = true
