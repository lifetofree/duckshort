name = "duckshort"
main = "src/index.tsx"
compatibility_date = "2025-04-15"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[dev]
port = 8787
local_protocol = "http"

[[d1_databases]]
binding = "DB"
database_name = "duckshort-db"
database_id = "cbb432e6-7252-461d-83ff-d792be1413fb"

# Run once before deploying: wrangler kv namespace create RATE_LIMIT
# Then paste the returned id below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "8bb561a78e63471ba5d89daa37ba8fb5"

[[routes]]
pattern = "duckshort.cc/*"
zone_name = "duckshort.cc"

[triggers]
crons = ["0 * * * *"]

[vars]
BASE_URL = "https://duckshort.cc"

# ADMIN_SECRET is stored as an encrypted secret — do NOT add it here.
# Run once to set it: wrangler secret put ADMIN_SECRET

[observability]
enabled = true
