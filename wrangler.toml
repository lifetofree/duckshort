name = "duckshort"
main = "src/index.tsx"
compatibility_date = "2025-04-15"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8787
local_protocol = "http"

[[d1_databases]]
binding = "DB"
database_name = "duckshort-db"
database_id = "cbb432e6-7252-461d-83ff-d792be1413fb"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

[triggers]
crons = ["0 * * * *"]

[vars]
# Production override: set BASE_URL via `wrangler secret put BASE_URL` or in the Cloudflare dashboard
# under Workers > Settings > Variables. Do NOT hardcode the production domain here.
BASE_URL = "https://duckshort.cc"

# B-13: Pages project URL the Worker proxies /, /admin, and the catch-all to.
# Override per-environment in the Cloudflare dashboard (e.g. a staging Pages
# preview URL) without code changes. Defaults to the production Pages project
# if the var is unset, so existing deployments keep working.
PAGES_URL = "https://duckshort.pages.dev"

# ADMIN_SECRET is stored as an encrypted secret — do NOT add it here.
# Run once to set it: wrangler secret put ADMIN_SECRET

[observability]
enabled = true

[[routes]]
pattern = "duckshort.cc/*"
zone_name = "duckshort.cc"
