name: Deploy Staging

# 7.1: Auto-deploy every PR (and manual runs) to the staging environment.
# Triggers on:
#   - pull_request opened / reopened / synchronized against develop
#   - workflow_dispatch (manual from the Actions tab)
#
# Skips:
#   - PRs targeting main or feature/* branches that don't actually need a
#     preview deploy (use the Actions tab → "Deploy Staging" → Run workflow)
#
# The staging environment uses a separate D1 database (duckshort-db-staging)
# and a separate Pages project (staging.duckshort.pages.dev). See
# docs/OPERATIONS.md §staging for setup.

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          # Frontend is built with VITE_API_URL pointing at the staging
          # Worker so the SPA's /api/* requests hit the staging backend.
          VITE_API_URL: https://staging.duckshort.cc

      - name: Apply D1 migrations (staging)
        run: npx wrangler d1 migrations apply duckshort-db-staging --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker (staging)
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Pages (staging)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: duckshort-staging
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
