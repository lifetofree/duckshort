name: CI

# Runs on develop branch and PRs into main — tests only, no deployment.
on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-worker:
    name: Worker — typecheck + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  test-frontend:
    name: Frontend — typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Create .env (dev values — no real secrets needed for build check)
        run: |
          echo "VITE_API_URL=http://localhost:8787" > frontend/.env
          echo "VITE_ADMIN_SECRET=dev-secret" >> frontend/.env

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Typecheck
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Test
        working-directory: ./frontend
        run: npm run test

      - name: Build
        working-directory: ./frontend
        run: npm run build
