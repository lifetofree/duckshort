name: Deploy All

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-all
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check backend
        run: npx wrangler types && npx tsc --noEmit

      - name: Type check frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: 'https://duckshort.cc'
          VITE_ADMIN_SECRET: ${{ secrets.VITE_ADMIN_SECRET }}

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply duckshort-db --remote

      - name: Deploy worker (with static assets)
        run: npx wrangler deploy

      # Pages is the legacy duckshort.pages.dev hostname. The Worker at
      # duckshort.cc bundles the SPA via `[assets]`, so Pages only exists to
      # serve the legacy alias and 301 unknown paths to the Worker hostname
      # (see frontend/public/_redirects). Deploying after the Worker keeps
      # the legacy URL in sync with the latest build.
      - name: Deploy Pages (legacy duckshort.pages.dev alias)
        run: npx wrangler pages deploy frontend/dist --project-name duckshort --branch main --commit-dirty=true
