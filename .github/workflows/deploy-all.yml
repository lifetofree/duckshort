name: Deploy All

# Manual full-stack deploy — runs worker first, then frontend.
# Individual workflows (deploy-worker, deploy-frontend) handle auto-deploy on push.
# Use this when you need to redeploy everything without touching files.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-all
  cancel-in-progress: false

jobs:
  deploy-worker:
    name: Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply duckshort-db --remote --yes
          wranglerVersion: '4.83.0'

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --minify
          wranglerVersion: '4.83.0'

  deploy-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Create .env
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > frontend/.env
          echo "VITE_ADMIN_SECRET=${{ secrets.VITE_ADMIN_SECRET }}" >> frontend/.env

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Typecheck
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Test
        working-directory: ./frontend
        run: npm run test

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./frontend
          command: pages deploy dist --project-name=duckshort --branch main
          wranglerVersion: '4.83.0'
